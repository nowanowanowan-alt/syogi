<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>改造将棋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <h1>改造将棋</h1>

<div id="turnPanel">
    <div id="gameStatus"></div>
</div>

    <button id="resetBtn">
      リセット
    </button>
  </div>

  <div class="game">

<div class="board-area">

      <div id="draftUI" style="display:none">

        <div id="draftSelected"></div>

<button id="draftBackBtn" style="display:none;">
← もどる
</button>

        <div id="draftButtons"></div>

      </div>

    <div id="board"></div>

</div>

    <div class="side">

<div id="modeSelect" style="display:none">

    <button id="normalBtn">通常</button>

    <button id="fastBtn">高速</button>

    <button id="largeBtn">15×15</button>

</div>

      <button id="startBtn">ゲーム開始</button>
      
      <div id="selectedInfo">なし</div>
      <div id="pieceInfo"></div>
      <div id="battleLog"></div>
    
   <div id="skillPanel">
    <button id="skillButton" style="display:none;">
        特殊スキル
    </button>

    <div id="skillArea"></div>
</div>

    </div>
    
  </div>

  <script src="script.js"></script>

</body>
</html>
