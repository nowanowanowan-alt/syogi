<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>改造将棋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <h1>改造将棋</h1>

<div id="turnPanel">
    <div id="gameStatus"></div>
</div>

    <button id="resetBtn">
      リセット
    </button>
  </div>

  <div class="game">

<div class="board-area">

      <div id="draftUI" style="display:none">

        <div id="draftSelected"></div>

<button id="draftBackBtn" style="display:none;">
← もどる
</button>

        <div id="draftButtons"></div>

      </div>

    <div id="board"></div>

</div>

    <div class="side">

<div id="modeSelect">

<h3>ゲームモード</h3>

<label>
<input
type="radio"
name="mode"
value="normal"
checked>
通常モード
</label>

<br>

<label>
<input
type="radio"
name="mode"
value="fast">
早送りモード
</label>

<br>

<label>
<input
type="radio"
name="mode"
value="15">
15×15モード
</label>

</div>

      <button id="startBtn">ゲーム開始</button>
      
      <div id="selectedInfo">なし</div>
      <div id="pieceInfo"></div>
      <div id="battleLog"></div>
    
   <div id="skillPanel">
    <button id="skillButton" style="display:none;">
        特殊スキル
    </button>

    <div id="skillArea"></div>
</div>

    </div>
    
  </div>

  <script src="script.js"></script>

</body>
</html>
